<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- Link to CSS file -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Corner decorations -->
    <div class="corner-tl"></div>
    <div class="corner-br"></div>

    <!-- Login card -->
    <div class="card">

        <!-- Title -->
        <div class="form-header">
            <h2 class="form-title">Sign in</h2>
            <p class="form-sub">Enter your credentials to continue</p>
        </div>

        <!-- Email field -->
        <div class="field">
            <label for="email">Email address</label>
            <input
                type="email"
                id="email"
                name="email"
                placeholder="you@example.com"
                required
            >
        </div>

        <!-- Password field -->
        <div class="field">
            <label for="password">Password</label>
            <input
                type="password"
                id="password"
                name="password"
                placeholder="••••••••"
                required
            >
        </div>

        <!-- Remember me and Forgot password -->
        <div class="row">
            <label class="remember">
                <input type="checkbox">
                <span>Remember me</span>
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <!-- Sign in button -->
        <div class="field">
            <button type="submit" class="login-btn">Sign in</button>
        </div>

        <!-- Divider -->
        <div class="divider">
            <span>or continue with</span>
        </div>

        <!-- Social buttons -->
        <div class="social-buttons">

            <button class="social-btn">
                <img class="logo-google" src="google.png" width="20" height="20" alt="Google logo">
                Continue with Google
            </button>

            <button class="social-btn">
                <img class="logo-github" src="GitHub-Mark.png" width="20" height="20" alt="GitHub logo">
                Continue with GitHub
            </button>

            <button class="social-btn">
                <img class="logo-apple" src="apple.png" width="20" height="20" alt="Apple logo">
                Continue with Apple
            </button>

        </div>

        <!-- Sign up link -->
        <div class="signup-link">
            <p>Don't have an account? <a href="#">Sign up</a></p>
        </div>

    </div>

</body>
</html>
