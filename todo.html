<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do App</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #eef1f5; /* light ash */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .todo-container {
            background: #ffffff;
            width: 360px;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.04);
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
            color: #2d3436;
        }

        /* Progress */
        .progress-text {
            font-size: 14px;
            margin-bottom: 8px;
            color: #636e72;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #dfe6e9;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress {
            height: 100%;
            width: 0%;
            background: #6c5ce7;
            transition: 0.3s;
        }

        .input-section {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #dcdde1;
            border-radius: 10px;
            outline: none;
            background: #f8f9fa;
        }

        input:focus {
            border-color: #6c5ce7;
        }

        button {
            padding: 10px 14px;
            background: #6c5ce7;
            border: none;
            color: white;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #5a4fcf;
        }

        .clear-btn {
            width: 100%;
            margin-top: 10px;
            background: #d63031;
        }

        .clear-btn:hover {
            background: #b71c1c;
        }

        ul {
            list-style: none;
            margin-top: 20px;
        }

        li {
            background: #f5f7fa;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        li.completed span {
            text-decoration: line-through;
            color: #b2bec3;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #d63031;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="todo-container">
    <h2>To-Do</h2>

    <div class="progress-text" id="progressText">0% completed</div>
    <div class="progress-bar">
        <div class="progress" id="progressBar"></div>
    </div>

    <div class="input-section">
        <input type="text" id="taskInput" placeholder="Add a task...">
        <button onclick="addTask()">Add</button>
    </div>

    <button class="clear-btn" onclick="clearAll()">Clear All</button>

    <ul id="taskList"></ul>
</div>

<script>
    const input = document.getElementById("taskInput");
    const list = document.getElementById("taskList");
    const progressText = document.getElementById("progressText");
    const progressBar = document.getElementById("progressBar");

    function updateProgress() {
        const tasks = document.querySelectorAll("li");
        const completed = document.querySelectorAll("li.completed");

        const total = tasks.length;
        const done = completed.length;

        const percent = total === 0 ? 0 : Math.round((done / total) * 100);

        progressText.innerText = percent + "% completed";
        progressBar.style.width = percent + "%";
    }

    function addTask() {
        const taskText = input.value.trim();
        if (taskText === "") return;

        const li = document.createElement("li");

        li.innerHTML = `
            <div class="task">
                <input type="checkbox">
                <span>${taskText}</span>
            </div>
            <button class="delete-btn">✖</button>
        `;

        li.querySelector("input").addEventListener("change", function () {
            li.classList.toggle("completed");
            updateProgress();
        });

        li.querySelector(".delete-btn").addEventListener("click", function () {
            li.remove();
            updateProgress();
        });

        list.appendChild(li);
        input.value = "";
        updateProgress();
    }

    function clearAll() {
        list.innerHTML = "";
        updateProgress();
    }

    input.addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            addTask();
        }
    });
</script>

</body>
</html>
